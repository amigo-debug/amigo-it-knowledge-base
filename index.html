<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amigo IT 知識庫</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; padding: 1.5rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(148,163,184,0.15); }
    h1 { font-size: 2.2rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { color: #94a3b8; font-size: 0.95rem; }
    .stats { color: #64748b; font-size: 0.85rem; margin-top: 0.5rem; }
    .controls { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .controls select, .controls input { padding: 0.5rem 0.75rem; background: rgba(30,41,59,0.9); color: #e2e8f0; border: 1px solid rgba(148,163,184,0.3); border-radius: 0.5rem; font-size: 0.9rem; }
    .controls input { flex: 1; min-width: 200px; max-width: 400px; }
    .count { color: #64748b; font-size: 0.85rem; margin-left: auto; }
    .terms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
    .term-card { background: rgba(30,41,59,0.8); border: 1px solid rgba(148,163,184,0.15); border-radius: 0.75rem; padding: 1.25rem; transition: all 0.2s ease; }
    .term-card:hover { border-color: rgba(148,163,184,0.4); background: rgba(30,41,59,1); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .term-header { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.75rem; }
    .term-icon { font-size: 1.5rem; flex-shrink: 0; }
    .term-en { font-weight: 700; font-size: 1rem; color: #60a5fa; line-height: 1.3; }
    .term-zh { font-size: 0.85rem; color: #94a3b8; margin-top: 0.15rem; }
    .term-cat { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 9999px; background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); margin-bottom: 0.75rem; }
    .term-desc { font-size: 0.875rem; line-height: 1.65; color: #cbd5e1; margin-bottom: 0.75rem; }
    .term-analogy { font-size: 0.8rem; line-height: 1.55; color: #94a3b8; background: rgba(148,163,184,0.08); border-left: 3px solid rgba(167,139,250,0.5); padding: 0.5rem 0.75rem; border-radius: 0 0.375rem 0.375rem 0; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.75rem; }
    .tag { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 0.25rem; background: rgba(148,163,184,0.1); color: #64748b; }
    .empty { text-align: center; color: #64748b; padding: 3rem; grid-column: 1/-1; }
    footer { text-align: center; margin-top: 3rem; color: #64748b; font-size: 0.8rem; padding-top: 1.5rem; border-top: 1px solid rgba(148,163,184,0.1); }
    footer a { color: #60a5fa; text-decoration: none; }
    @media (max-width: 600px) { h1 { font-size: 1.6rem; } .terms-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 Amigo IT 知識庫</h1>
      <p class="subtitle">恩海居資訊中心 — 用廣東話解釋 IT 術語</p>
      <p class="stats" id="statsText">載入中...</p>
    </header>
    <div class="controls">
      <select id="categoryFilter"><option value="">📚 所有分類</option></select>
      <input type="text" id="searchInput" placeholder="🔎 搜尋術語（中文 / 英文）...">
      <span class="count" id="countText"></span>
    </div>
    <div id="termsContainer" class="terms-grid">
      <div class="empty">⏳ 載入知識庫...</div>
    </div>
    <footer>
      <p>Amigo IT 知識庫 · 恩海居資訊中心 · <a href="https://github.com/amigo-debug/amigo-it-knowledge-base" target="_blank">GitHub</a></p>
    </footer>
  </div>
  <script>
    let allTerms = [], categories = {};
    async function loadData() {
      try {
        const res = await fetch('terms.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        allTerms = data.terms || [];
        categories = data.categories || {};
        const catFilter = document.getElementById('categoryFilter');
        const catSet = [...new Set(allTerms.map(t => t.cat))];
        catSet.forEach(cat => {
          const info = categories[cat] || {};
          const opt = document.createElement('option');
          opt.value = cat;
          opt.textContent = (info.icon || '') + ' ' + (info.label || cat);
          catFilter.appendChild(opt);
        });
        document.getElementById('statsText').textContent = '共 ' + allTerms.length + ' 個術語 · ' + catSet.length + ' 個分類';
        renderTerms();
      } catch (err) {
        document.getElementById('termsContainer').innerHTML = '<div class="empty">❌ 載入失敗：' + err.message + '</div>';
        document.getElementById('statsText').textContent = '載入失敗';
      }
    }
    function renderTerms() {
      const cat = document.getElementById('categoryFilter').value;
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      let filtered = allTerms;
      if (cat) filtered = filtered.filter(t => t.cat === cat);
      if (q) filtered = filtered.filter(t => t.en.toLowerCase().includes(q) || t.zh.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || (t.tags||[]).some(tag => tag.toLowerCase().includes(q)));
      document.getElementById('countText').textContent = filtered.length + ' 個結果';
      const container = document.getElementById('termsContainer');
      if (filtered.length === 0) { container.innerHTML = '<div class="empty">😕 找不到相關術語</div>'; return; }
      container.innerHTML = filtered.map(t => {
        const icon = t.catIcon || '📖';
        const catLabel = t.catLabel || t.cat;
        const analogy = t.analogy ? '<div class="term-analogy">💡 ' + t.analogy + '</div>' : '';
        const tags = t.tags && t.tags.length ? '<div class="tags">' + t.tags.map(tag => '<span class="tag">' + tag + '</span>').join('') + '</div>' : '';
        return '<div class="term-card"><div class="term-header"><div class="term-icon">' + icon + '</div><div><div class="term-en">' + t.en + '</div><div class="term-zh">' + t.zh + '</div></div></div><div class="term-cat">' + catLabel + '</div><div class="term-desc">' + t.desc + '</div>' + analogy + tags + '</div>';
      }).join('');
    }
    document.getElementById('categoryFilter').addEventListener('change', renderTerms);
    document.getElementById('searchInput').addEventListener('input', renderTerms);
    loadData();
  </script>
</body>
</html>
